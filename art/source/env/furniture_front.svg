<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" shape-rendering="crispEdges">
  <!-- env_bar_furniture_front: front occlusion. Counter top strip + front face (duplicated from bg_mid,
       masked where nearer table D overlaps), tabletop near-edge strips + aprons, chair front legs/edges,
       south-seat backrests, two counter stools. Renders above characters. -->
  <defs>
    <g id="chair_f"><!-- front legs + seat front edge (east/west seats) -->
      <rect x="-11" y="3" width="22" height="2" fill="#46301c"/>
      <rect x="-11" y="5" width="22" height="1" fill="#131114"/>
      <rect x="-11" y="4" width="2" height="21" fill="#2b1d12"/>
      <rect x="9" y="4" width="2" height="21" fill="#2b1d12"/>
    </g>
    <g id="chair_f_s"><!-- south seats: front legs + seat edge + camera-facing backrest -->
      <rect x="-9" y="-25" width="18" height="1" fill="#131114"/>
      <rect x="-9" y="-24" width="18" height="4" fill="#46301c"/>
      <rect x="-8" y="-20" width="2" height="23" fill="#46301c"/>
      <rect x="6" y="-20" width="2" height="23" fill="#46301c"/>
      <rect x="-11" y="3" width="22" height="2" fill="#46301c"/>
      <rect x="-11" y="5" width="22" height="1" fill="#131114"/>
      <rect x="-11" y="4" width="2" height="21" fill="#2b1d12"/>
      <rect x="9" y="4" width="2" height="21" fill="#2b1d12"/>
    </g>
    <g id="stool"><!-- counter stool, fully drawn here (empty seat, drawn after counter).
         Bar-height: seat ~42px above its floor point so it holds scale against the counter. -->
      <rect x="-9" y="-17" width="18" height="1" fill="#131114"/>
      <rect x="-9" y="-16" width="18" height="4" fill="#46301c"/>
      <rect x="-9" y="-12" width="2" height="37" fill="#2b1d12"/>
      <rect x="7" y="-12" width="2" height="37" fill="#2b1d12"/>
      <rect x="-1" y="-11" width="2" height="36" fill="#2b1d12"/>
      <rect x="-7" y="6" width="14" height="1" fill="#2b1d12"/><!-- foot ring -->
    </g>
    <mask id="mcut" maskUnits="userSpaceOnUse" x="0" y="0" width="640" height="360">
      <rect x="0" y="0" width="640" height="360" fill="#ffffff"/>
      <ellipse cx="240" cy="247" rx="43" ry="14" fill="#000000"/>
      <polygon points="233,256 247,256 254,310 226,310" fill="#000000"/>
    </mask>
    <mask id="mtables" maskUnits="userSpaceOnUse" x="0" y="0" width="640" height="360">
      <rect x="0" y="0" width="640" height="360" fill="#ffffff"/>
      <ellipse cx="310" cy="190" rx="35" ry="11" fill="#000000"/>
      <ellipse cx="440" cy="200" rx="37" ry="11" fill="#000000"/>
      <ellipse cx="397" cy="253" rx="45" ry="14" fill="#000000"/>
      <ellipse cx="240" cy="247" rx="43" ry="14" fill="#000000"/>
      <ellipse cx="510" cy="253" rx="45" ry="14" fill="#000000"/>
    </mask>
  </defs>

  <!-- counter occluder: front half of top slab + front face (identical fills to bg_mid),
       masked out where table D (nearer) overlaps -->
  <g mask="url(#mcut)">
    <polygon points="90,197 248,197 252,218 86,224" fill="#654627"/>
    <polygon points="88,207 250,206 250,207 88,208" fill="#57381c"/>
    <rect x="150" y="200" width="2" height="1" fill="#131114"/>
    <rect x="205" y="212" width="2" height="1" fill="#131114"/>
    <ellipse cx="222" cy="203" rx="8" ry="3" fill="#5a524e"/>
    <ellipse cx="222" cy="202" rx="7" ry="2" fill="#7d7268"/>
    <polygon points="86,222 252,216 252,218 86,224" fill="#8a6435"/>
    <polygon points="86,224 252,218 255,272 72,280" fill="#46301c"/>
    <polygon points="86,224 252,218 252,221 86,227" fill="#2b1d12"/>
    <polygon points="96,232 134,230 134,262 94,264" fill="#654627"/>
    <polygon points="148,229 188,227 188,260 147,262" fill="#654627"/>
    <polygon points="202,226 242,224 242,257 201,259" fill="#654627"/>
    <polygon points="86,224 89,224 75,280 72,280" fill="#2b1d12"/>
    <polygon points="74,270 255,264 255,272 72,280" fill="#2b1d12"/>
    <polygon points="90,271 104,270 104,273 90,274" fill="#46301c"/>
    <polygon points="160,268 178,267 178,270 160,271" fill="#46301c"/>
  </g>

  <!-- tabletop near-edge strips + aprons (occlude thighs of north-side sitters) -->
  <g>
    <path d="M275,190 A35,11 0 0 0 345,190 A35,8 0 0 1 275,190 Z" fill="#46301c"/>
    <rect x="296" y="200" width="28" height="3" fill="#2b1d12"/>
    <path d="M403,200 A37,11 0 0 0 477,200 A37,8 0 0 1 403,200 Z" fill="#46301c"/>
    <rect x="426" y="210" width="28" height="3" fill="#2b1d12"/>
    <path d="M352,253 A45,14 0 0 0 442,253 A45,10 0 0 1 352,253 Z" fill="#2b1d12"/>
    <rect x="380" y="266" width="34" height="3" fill="#2b1d12"/>
    <path d="M197,247 A43,14 0 0 0 283,247 A43,10 0 0 1 197,247 Z" fill="#2b1d12"/>
    <rect x="224" y="260" width="32" height="3" fill="#2b1d12"/>
    <path d="M465,253 A45,14 0 0 0 555,253 A45,10 0 0 1 465,253 Z" fill="#46301c"/>
    <rect x="493" y="266" width="34" height="3" fill="#2b1d12"/>
  </g>

  <!-- east/west chair fronts (masked where tabletop overlaps inner legs) -->
  <g mask="url(#mtables)">
    <use href="#chair_f" x="343" y="190"/>
    <use href="#chair_f" x="277" y="190"/>
    <use href="#chair_f" x="475" y="200"/>
    <!-- seat-08 (405,200) chair front lives in seat_back: Nikolai (seat-09) is nearer and must paint over it -->
    <use href="#chair_f" x="443" y="257"/>
    <use href="#chair_f" x="350" y="257"/>
    <use href="#chair_f" x="283" y="247"/>
    <use href="#chair_f" x="197" y="247"/>
    <use href="#chair_f" x="555" y="253"/>
    <use href="#chair_f" x="465" y="253"/>
  </g>
  <!-- south chairs: backrest faces camera, unmasked (nearer than tabletop) -->
  <use href="#chair_f_s" x="310" y="217"/>
  <use href="#chair_f_s" x="440" y="230"/>
  <use href="#chair_f_s" x="240" y="280"/>

  <!-- two counter stools in front of counter (west of table D's footprint) -->
  <use href="#stool" x="120" y="262"/>
  <use href="#stool" x="170" y="258"/>
</svg>
