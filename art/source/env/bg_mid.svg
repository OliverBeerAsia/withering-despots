<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" shape-rendering="crispEdges">
  <!-- env_bar_bg_mid: counter, back-counter, phone shelf, doors, TV housing (screen = hole), tables. Transparent layer. -->

  <!-- back-counter working surface against rear wall, fluorescent teal_3 edge -->
  <polygon points="85,180 245,184 245,207 85,207" fill="#46301c"/>
  <rect x="85" y="180" width="160" height="2" fill="#628072"/>

  <!-- telephone shelf (phone itself is a prop sprite at anchor-telephone 180,130) -->
  <rect x="168" y="122" width="23" height="3" fill="#654627"/>
  <rect x="168" y="125" width="23" height="1" fill="#2b1d12"/>
  <rect x="171" y="126" width="2" height="7" fill="#2b1d12"/>
  <rect x="186" y="126" width="2" height="7" fill="#2b1d12"/>
  <rect x="170" y="132" width="4" height="1" fill="#2b1d12"/>
  <rect x="185" y="132" width="4" height="1" fill="#2b1d12"/>

  <!-- service door leaf -->
  <rect x="247" y="102" width="33" height="105" fill="#2a4540"/>
  <rect x="251" y="110" width="25" height="40" fill="#182a28"/>
  <rect x="251" y="158" width="25" height="42" fill="#182a28"/>
  <rect x="274" y="153" width="3" height="2" fill="#7d7268"/>

  <!-- street door leaf: teal_0 frame, soot_0 night glass, one cyan_0 streetlight streak -->
  <polygon points="537,107 569,99 569,218 537,207" fill="#182a28"/>
  <polygon points="540,110 566,103 566,213 540,204" fill="#131114"/>
  <polygon points="551,105 555,104 555,212 551,213" fill="#1e4652"/>

  <!-- television housing high right; screen aperture x471-520 y59-88 stays transparent -->
  <g>
    <rect x="465" y="52" width="63" height="7" fill="#3d383b"/>
    <rect x="465" y="59" width="6" height="29" fill="#3d383b"/>
    <rect x="520" y="59" width="8" height="29" fill="#3d383b"/>
    <rect x="465" y="88" width="63" height="6" fill="#3d383b"/>
    <rect x="465" y="91" width="63" height="3" fill="#262227"/>
    <rect x="525" y="52" width="3" height="42" fill="#262227"/>
    <!-- cyan_0 static rim around the aperture -->
    <rect x="470" y="58" width="51" height="1" fill="#1e4652"/>
    <rect x="470" y="88" width="51" height="1" fill="#1e4652"/>
    <rect x="470" y="59" width="1" height="29" fill="#1e4652"/>
    <rect x="520" y="59" width="1" height="29" fill="#1e4652"/>
    <!-- wall bracket -->
    <rect x="492" y="94" width="8" height="6" fill="#3d383b"/>
    <rect x="488" y="100" width="16" height="3" fill="#262227"/>
  </g>

  <!-- counter (QA P0 rework): same blockout footprint (rear top edge 95,163-245,168
       keeps the staff waist-cut; floor line 72,280-255,272 unchanged) but the top
       reads as a worked surface — grain seams toward VP-L, taps/glasses/rag/tray
       clutter — and the front face is tall (constant ~52px) with paneling so the
       form reads counter, not ramp. -->
  <g>
    <!-- top surface -->
    <polygon points="95,163 245,168 252,218 86,224" fill="#654627"/>
    <polygon points="95,163 245,168 245,170 95,165" fill="#628072"/><!-- fluorescent catch on back edge -->
    <!-- grain seams running the counter's length (converge slightly to VP-L) -->
    <polygon points="92,177 247,181 247,182 92,178" fill="#57381c"/>
    <polygon points="90,192 249,194 249,195 90,193" fill="#57381c"/>
    <polygon points="88,207 250,206 250,207 88,208" fill="#57381c"/>
    <!-- wear stains / ring marks -->
    <rect x="150" y="200" width="2" height="1" fill="#131114"/>
    <rect x="205" y="212" width="2" height="1" fill="#131114"/>
    <rect x="128" y="186" width="3" height="1" fill="#46301c"/>
    <rect x="223" y="176" width="2" height="1" fill="#46301c"/>
    <!-- two beer taps standing on the rear half -->
    <g>
      <rect x="117" y="166" width="6" height="3" fill="#2b1d12"/>
      <rect x="119" y="155" width="2" height="11" fill="#3d383b"/>
      <rect x="117" y="152" width="4" height="3" fill="#b47c31"/>
      <rect x="131" y="167" width="6" height="3" fill="#2b1d12"/>
      <rect x="133" y="156" width="2" height="11" fill="#3d383b"/>
      <rect x="131" y="153" width="4" height="3" fill="#b47c31"/>
    </g>
    <!-- row of upturned faceted glasses drying near the back edge -->
    <g>
      <rect x="180" y="172" width="4" height="5" fill="#628072"/>
      <rect x="180" y="172" width="1" height="5" fill="#b2a17c"/>
      <rect x="187" y="173" width="4" height="5" fill="#628072"/>
      <rect x="187" y="173" width="1" height="5" fill="#b2a17c"/>
      <rect x="194" y="174" width="4" height="5" fill="#628072"/>
      <rect x="194" y="174" width="1" height="5" fill="#b2a17c"/>
    </g>
    <!-- folded bar rag -->
    <rect x="155" y="190" width="12" height="4" fill="#628072"/>
    <rect x="155" y="193" width="12" height="1" fill="#416359"/>
    <!-- round service tray -->
    <ellipse cx="222" cy="203" rx="8" ry="3" fill="#5a524e"/>
    <ellipse cx="222" cy="202" rx="7" ry="2" fill="#7d7268"/>
    <!-- varnish sheen on the top's front edge -->
    <polygon points="86,222 252,216 252,218 86,224" fill="#8a6435"/>
    <!-- front face: tall, darker than top so the edge breaks -->
    <polygon points="86,224 252,218 255,272 72,280" fill="#46301c"/>
    <polygon points="86,224 252,218 252,221 86,227" fill="#2b1d12"/><!-- under-lip shadow -->
    <!-- raised front panels -->
    <polygon points="96,232 134,230 134,262 94,264" fill="#654627"/>
    <polygon points="148,229 188,227 188,260 147,262" fill="#654627"/>
    <polygon points="202,226 242,224 242,257 201,259" fill="#654627"/>
    <!-- left end seam so the slab ends instead of blending into the floor -->
    <polygon points="86,224 89,224 75,280 72,280" fill="#2b1d12"/>
    <!-- kick line scuffed to bare wood -->
    <polygon points="74,270 255,264 255,272 72,280" fill="#2b1d12"/>
    <polygon points="90,271 104,270 104,273 90,274" fill="#46301c"/>
    <polygon points="160,268 178,267 178,270 160,271" fill="#46301c"/>
  </g>

  <!-- tables: A,B (newer wood_2) then C,E,D (draw order = depth) -->
  <!-- table A (310,190) -->
  <g>
    <ellipse cx="310" cy="190" rx="35" ry="11" fill="#46301c"/>
