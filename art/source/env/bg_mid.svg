    <ellipse cx="440" cy="200" rx="25" ry="7" fill="#855524"/>
    <ellipse cx="440" cy="200" rx="15" ry="4" fill="#b47c31"/>
    <polygon points="434,206 446,206 449,242 431,242" fill="#46301c"/>
    <polygon points="434,206 435,206 432,242 431,242" fill="#654627"/>
    <polygon points="444,206 446,206 449,242 446,242" fill="#2b1d12"/>
    <rect x="429" y="242" width="24" height="3" fill="#2b1d12"/>
    <rect x="419" y="207" width="2" height="1" fill="#131114"/>
  </g>
  <!-- table C (397,253) older, darker -->
  <g>
    <ellipse cx="397" cy="253" rx="45" ry="14" fill="#2b1d12"/>
    <ellipse cx="397" cy="252" rx="44" ry="13" fill="#654627"/>
    <ellipse cx="397" cy="253" rx="42" ry="12" fill="#46301c"/>
    <ellipse cx="397" cy="253" rx="30" ry="9" fill="#57381c"/>
