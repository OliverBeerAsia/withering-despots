<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Café-Bar The Shift Phase 1 locked perspective blockout</title>
  <desc id="desc">A fixed-camera geometric graybox with a stable horizon, perspective guides, five tables, separated patron placeholders, fixture anchors, walk anchors, and subtitle-safe region.</desc>
  <style>
    .wall { fill: #26343c; stroke: #b9c8c8; stroke-width: 4; }
    .floor { fill: #3e3733; stroke: #b9c8c8; stroke-width: 4; }
    .fixture { fill: #607077; stroke: #e2e8e6; stroke-width: 3; }
    .table { fill: #48676b; stroke: #d5eeee; stroke-width: 3; }
    .guide { fill: none; stroke: #80a0a2; stroke-width: 2; stroke-dasharray: 12 10; opacity: .65; }
    .horizon { stroke: #e4c779; stroke-width: 3; stroke-dasharray: 18 10; }
    .anchor { fill: #f3d36e; stroke: #10161b; stroke-width: 3; }
    .walk { fill: none; stroke: #91c7a6; stroke-width: 5; stroke-dasharray: 14 10; }
    .patron { fill: #b86f65; stroke: #f4d5cd; stroke-width: 3; }
    .sasha { fill: #d3a354; stroke: #fff0bd; stroke-width: 3; }
    .safe { fill: #11171d; fill-opacity: .72; stroke: #e3c976; stroke-width: 3; stroke-dasharray: 12 8; }
    .label { fill: #f6f2e8; font: 22px ui-monospace, monospace; paint-order: stroke; stroke: #11171d; stroke-width: 5; }
    .small { fill: #e5e9e6; font: 17px ui-monospace, monospace; paint-order: stroke; stroke: #11171d; stroke-width: 4; }
  </style>

  <rect width="1920" height="1080" fill="#10171c" />
  <g id="locked-camera">
    <line id="horizon-y360" class="horizon" x1="0" y1="360" x2="1920" y2="360" />
    <circle id="vanishing-point-left" class="anchor" cx="20" cy="360" r="7" />
    <circle id="vanishing-point-right" class="anchor" cx="1900" cy="360" r="7" />
    <text class="small" x="36" y="345">VP-L</text>
    <text class="small" x="1822" y="345">VP-R</text>
    <path id="perspective-guides" class="guide" d="M20 360L240 620M20 360L0 1080M20 360L1680 620M1900 360L240 620M1900 360L1920 1080M1900 360L1680 620" />
  </g>

  <g id="room-envelope">
    <path id="rear-wall" class="wall" d="M240 150H1680V620H240Z" />
    <path id="left-wall" class="wall" d="M0 0L240 150V620L0 1080Z" />
    <path id="right-wall" class="wall" d="M1920 0L1680 150V620L1920 1080Z" />
    <path id="floor-plane" class="floor" d="M240 620H1680L1920 1080H0Z" />
    <circle id="anchor-room-center" class="anchor" cx="960" cy="540" r="9" />
    <text class="small" x="820" y="390">locked horizon y=360</text>
  </g>

  <g id="service-corridor-fixture">
    <path id="service-corridor" class="fixture" d="M700 270L875 275V620H700Z" />
    <path fill="#12191e" stroke="#d7dfdc" stroke-width="3" d="M740 305L840 308V620H740Z" />
    <text class="small" x="700" y="255">service corridor</text>
  </g>
  <g id="service-door-fixture">
    <path id="service-door" fill="none" stroke="#e2c576" stroke-width="5" d="M740 305L840 308V620H740Z" />
    <circle id="anchor-service-door" class="anchor" cx="790" cy="410" r="9" />
  </g>
  <g id="street-entrance-fixture">
    <path class="fixture" d="M1582 282L1735 250V684L1582 620Z" />
    <path id="street-entrance" fill="#151e24" stroke="#e7cc7d" stroke-width="4" d="M1610 320L1706 297V654L1610 620Z" />
    <circle id="anchor-entrance" class="anchor" cx="1700" cy="560" r="9" />
    <text class="small" x="1560" y="265">street entrance</text>
  </g>

  <g id="counter-rear-left">
    <path id="counter-top" class="fixture" d="M285 490L735 505L765 690L250 705Z" />
    <path id="counter-front" class="fixture" d="M250 705L765 690V815L215 840Z" />
    <circle id="anchor-counter" class="anchor" cx="420" cy="560" r="9" />
    <text class="label" x="390" y="665">COUNTER</text>
  </g>
  <g id="phone-behind-counter">
    <rect class="fixture" x="505" y="365" width="70" height="45" rx="10" />
    <path fill="none" stroke="#e2e8e6" stroke-width="7" d="M515 384Q540 357 565 384" />
    <circle id="anchor-telephone" class="anchor" cx="540" cy="390" r="9" />
    <text class="small" x="450" y="345">phone</text>
  </g>
  <g id="television-high-right">
    <rect class="fixture" x="1395" y="155" width="190" height="126" rx="12" />
    <rect fill="#152027" stroke="#dbe3e0" stroke-width="3" x="1414" y="176" width="147" height="86" rx="7" />
    <circle id="anchor-television" class="anchor" cx="1490" cy="210" r="9" />
    <text class="small" x="1435" y="140">television</text>
  </g>

  <g id="table-a"><ellipse class="table" cx="930" cy="570" rx="105" ry="32" /><path class="fixture" d="M912 580H948L962 720H898Z" /><circle id="anchor-table-a" class="anchor" cx="930" cy="570" r="8" /><text class="label" x="912" y="562">A</text></g>
  <g id="table-b"><ellipse class="table" cx="1320" cy="600" rx="110" ry="34" /><path class="fixture" d="M1301 610H1339L1355 765H1285Z" /><circle id="anchor-table-b" class="anchor" cx="1320" cy="600" r="8" /><text class="label" x="1302" y="592">B</text></g>
  <g id="table-c"><ellipse class="table" cx="1190" cy="760" rx="135" ry="43" /><path class="fixture" d="M1167 772H1213L1235 950H1145Z" /><circle id="anchor-table-c" class="anchor" cx="1190" cy="760" r="8" /><text class="label" x="1172" y="750">C</text></g>
  <g id="table-d"><ellipse class="table" cx="720" cy="740" rx="130" ry="42" /><path class="fixture" d="M698 752H742L762 930H678Z" /><circle id="anchor-table-d" class="anchor" cx="720" cy="740" r="8" /><text class="label" x="702" y="730">D</text></g>
  <g id="table-e"><ellipse class="table" cx="1530" cy="760" rx="135" ry="43" /><path class="fixture" d="M1507 772H1553L1575 950H1485Z" /><circle id="anchor-table-e" class="anchor" cx="1530" cy="760" r="8" /><text class="label" x="1512" y="750">E</text></g>

  <g id="seat-anchors">
    <circle id="anchor-seat-01" class="anchor" cx="920" cy="500" r="6" />
    <circle id="anchor-seat-02" class="anchor" cx="1030" cy="570" r="6" />
    <circle id="anchor-seat-03" class="anchor" cx="930" cy="650" r="6" />
    <circle id="anchor-seat-04" class="anchor" cx="830" cy="570" r="6" />
    <circle id="anchor-seat-05" class="anchor" cx="1310" cy="540" r="6" />
    <circle id="anchor-seat-06" class="anchor" cx="1425" cy="600" r="6" />
    <circle id="anchor-seat-07" class="anchor" cx="1320" cy="690" r="6" />
    <circle id="anchor-seat-08" class="anchor" cx="1215" cy="600" r="6" />
    <circle id="anchor-seat-09" class="anchor" cx="1190" cy="690" r="6" />
    <circle id="anchor-seat-10" class="anchor" cx="1330" cy="770" r="6" />
    <circle id="anchor-seat-11" class="anchor" cx="1050" cy="770" r="6" />
    <circle id="anchor-seat-12" class="anchor" cx="720" cy="650" r="6" />
    <circle id="anchor-seat-13" class="anchor" cx="850" cy="740" r="6" />
    <circle id="anchor-seat-14" class="anchor" cx="720" cy="840" r="6" />
    <circle id="anchor-seat-15" class="anchor" cx="590" cy="740" r="6" />
    <circle id="anchor-seat-16" class="anchor" cx="1530" cy="690" r="6" />
    <circle id="anchor-seat-17" class="anchor" cx="1665" cy="760" r="6" />
    <circle id="anchor-seat-18" class="anchor" cx="1395" cy="760" r="6" />
  </g>

  <g id="anchor-patron-north" transform="translate(920 470)">
    <circle class="anchor" r="8" /><circle class="patron" cy="15" r="37" /><path class="patron" d="M-57 62Q0 34 57 62L78 205H-78Z" />
    <text class="small" x="-78" y="-55">patron north</text>
  </g>
  <g id="anchor-patron-east" transform="translate(1310 510)">
    <circle class="anchor" r="8" /><circle class="patron" cy="15" r="39" /><path class="patron" d="M-60 64Q0 35 60 64L82 215H-82Z" />
    <text class="small" x="45" y="-20">patron east</text>
  </g>
  <g id="anchor-patron-south" transform="translate(1190 690)">
    <circle class="anchor" r="8" /><circle class="patron" cy="15" r="42" /><path class="patron" d="M-65 68Q0 37 65 68L88 220H-88Z" />
    <text class="small" x="-170" y="-30">patron south</text>
  </g>
  <g id="anchor-patron-west" transform="translate(720 650)">
    <circle class="anchor" r="8" /><circle class="patron" cy="15" r="40" /><path class="patron" d="M-62 66Q0 36 62 66L84 215H-84Z" />
    <text class="small" x="-165" y="-25">patron west</text>
  </g>

  <g id="movement-paths">
    <path class="walk" d="M430 500L620 750L1000 790L1450 720L1380 660" />
    <path class="walk" d="M1000 790L1700 560" />
  </g>
  <g id="anchor-sasha-bar"><circle class="sasha" cx="430" cy="500" r="12" /><text class="small" x="365" y="480">Sasha bar</text></g>
  <g id="anchor-sasha-telephone"><circle class="sasha" cx="610" cy="530" r="12" /><text class="small" x="565" y="510">Sasha phone</text></g>
  <g id="anchor-sasha-television"><circle class="sasha" cx="1380" cy="660" r="12" /><text class="small" x="1398" y="650">Sasha TV</text></g>
  <g id="anchor-walk-center"><circle class="anchor" cx="1000" cy="790" r="9" /><text class="small" x="915" y="825">walk center</text></g>
  <g id="anchor-walk-east"><circle class="anchor" cx="1450" cy="720" r="9" /><text class="small" x="1470" y="710">walk east</text></g>
  <g id="anchor-walk-west"><circle class="anchor" cx="620" cy="750" r="9" /><text class="small" x="525" y="735">walk west</text></g>

  <g id="subtitle-safe-region">
    <rect class="safe" x="300" y="840" width="1320" height="200" rx="24" />
    <text class="label" x="735" y="1010">SUBTITLE SAFE — y 840–1040</text>
  </g>
</svg>
